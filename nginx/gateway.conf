# Reverse proxy for Claude Toolstack gateway.
# Activated via: docker compose --profile remote up -d
#
# For mTLS, uncomment the ssl_client_certificate and ssl_verify_client lines
# and mount your CA cert at /etc/nginx/certs/ca.crt.

server {
    listen 8443 ssl;

    # Server TLS (required)
    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Client mTLS (optional — uncomment to require client certs)
    # ssl_client_certificate /etc/nginx/certs/ca.crt;
    # ssl_verify_client on;

    location / {
        proxy_pass http://gateway:8088;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Pass mTLS client info to gateway (when ssl_verify_client is on)
        proxy_set_header X-SSL-Client-Verify $ssl_client_verify;
        proxy_set_header X-SSL-Client-DN $ssl_client_s_dn;

        # Timeouts aligned with gateway
        proxy_read_timeout 120s;
        proxy_send_timeout 30s;
    }
}
