# /etc/sysctl.d/99-inotify-large-repos.conf
# Scale file watching for large repos (LSPs, build tools, hot reloaders)
# Default max_user_watches is often 8192-65536 — far too low for monorepos.
# Each watch costs ~160 bytes on 64-bit, so 1M watches ≈ 160 MB.

fs.inotify.max_user_watches = 1048576
fs.inotify.max_user_instances = 1024
