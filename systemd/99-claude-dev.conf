# /etc/sysctl.d/99-claude-dev.conf
# Swap/cache tuning for zram-backed swap on a 64-GB dev workstation

# With zram (compressed in-memory swap), higher swappiness is beneficial:
# the kernel swaps to RAM (compressed) instead of disk, reducing I/O pressure.
vm.swappiness = 100

# Reclaim dentries/inodes aggressively to avoid OOM from cache bloat.
# Default is 100; values < 50 risk OOM because kernel holds stale caches.
vm.vfs_cache_pressure = 100
