name: Corpus Report

on:
  workflow_dispatch:
    inputs:
      artifact_name:
        description: 'Artifact name pattern to download (default: latest sidecar)'
        required: false
        default: 'sidecar-evidence-*'
      emit_tuning:
        description: 'Generate tuning recommendations (true/false)'
        required: false
        default: 'true'
      evaluate_baseline:
        description: 'Path to baseline corpus for evaluation (empty = skip)'
        required: false
        default: ''

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  corpus-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install cts
        run: pip install -e .

      - name: Generate test sidecar artifact
        run: |
          # Produce a fresh sidecar from the current codebase
          mkdir -p artifacts
          python scripts/gen_test_sidecar.py artifacts/ci-artifact.json

      - name: Ingest corpus
        run: |
          cts corpus ingest artifacts/ \
            --out corpus.jsonl \
            --include-passes

      - name: Generate markdown report
        run: |
          cts corpus report corpus.jsonl \
            --format markdown \
            --out report.md

      - name: Generate JSON report
        run: |
          cts corpus report corpus.jsonl \
            --format json \
            --out report.json

      - name: Print report summary
        run: |
          cts corpus report corpus.jsonl --format text

      # --- Tuning pipeline (opt-in via inputs) ---

      - name: Generate tuning recommendations
        if: inputs.emit_tuning == 'true'
        run: |
          cts corpus report corpus.jsonl \
            --format json \
            --emit-tuning tuning.json

          echo "--- Tuning recommendations ---"
          cat tuning.json | python -m json.tool | head -60

      - name: Generate patch plan (dry-run)
        if: inputs.emit_tuning == 'true'
        run: |
          cts corpus patch tuning.json \
            --repos-yaml repos.yaml \
            --format text

          cts corpus patch tuning.json \
            --repos-yaml repos.yaml \
            --format json \
            --out patch-plan.json

          cts corpus patch tuning.json \
            --repos-yaml repos.yaml \
            --format diff \
            --out tuning.diff

      - name: Preview apply (dry-run)
        if: inputs.emit_tuning == 'true'
        run: |
          cts corpus apply tuning.json \
            --repos-yaml repos.yaml \
            --dry-run

      # --- Evaluation (opt-in via baseline path) ---

      - name: Evaluate tuning impact
        if: inputs.evaluate_baseline != ''
        run: |
          cts corpus evaluate \
            "${{ inputs.evaluate_baseline }}" \
            corpus.jsonl \
            --format text

          cts corpus evaluate \
            "${{ inputs.evaluate_baseline }}" \
            corpus.jsonl \
            --format json \
            --out evaluation.json

          cts corpus evaluate \
            "${{ inputs.evaluate_baseline }}" \
            corpus.jsonl \
            --format markdown \
            --out evaluation.md

      - name: Upload corpus artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: corpus-report-${{ github.sha }}
          path: |
            corpus.jsonl
            corpus_passes.jsonl
            report.md
            report.json
            tuning.json
            patch-plan.json
            tuning.diff
            evaluation.json
            evaluation.md
          retention-days: 90
